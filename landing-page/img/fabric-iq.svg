<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8a317"/><stop offset="100%" stop-color="#ffc107"/></linearGradient>
    <filter id="s3"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".15"/></filter>
  </defs>
  <rect width="400" height="260" fill="url(#fbg)" rx="16"/>
  <!-- Dashboard Panel -->
  <g transform="translate(80,25)" filter="url(#s3)">
    <rect x="0" y="0" width="240" height="160" rx="12" fill="#fff" opacity=".95"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="240" height="28" rx="12" fill="#ffc107" opacity=".2"/>
    <circle cx="16" cy="14" r="4" fill="#dc3545" opacity=".6"/>
    <circle cx="28" cy="14" r="4" fill="#ffc107" opacity=".6"/>
    <circle cx="40" cy="14" r="4" fill="#198754" opacity=".6"/>
    <!-- Bar chart -->
    <rect x="20" y="110" width="20" height="35" rx="3" fill="#0d6efd" opacity=".7"/>
    <rect x="48" y="90" width="20" height="55" rx="3" fill="#0d6efd" opacity=".5"/>
    <rect x="76" y="70" width="20" height="75" rx="3" fill="#0d6efd" opacity=".7"/>
    <rect x="104" y="100" width="20" height="45" rx="3" fill="#ffc107" opacity=".7"/>
    <rect x="132" y="60" width="20" height="85" rx="3" fill="#198754" opacity=".7"/>
    <!-- Line chart overlay -->
    <polyline points="30,105 58,85 86,65 114,95 142,55" fill="none" stroke="#dc3545" stroke-width="2.5" stroke-linecap="round" opacity=".7"/>
    <circle cx="30" cy="105" r="3" fill="#dc3545" opacity=".8"/>
    <circle cx="58" cy="85" r="3" fill="#dc3545" opacity=".8"/>
    <circle cx="86" cy="65" r="3" fill="#dc3545" opacity=".8"/>
    <circle cx="114" cy="95" r="3" fill="#dc3545" opacity=".8"/>
    <circle cx="142" cy="55" r="3" fill="#dc3545" opacity=".8"/>
    <!-- KPI cards -->
    <rect x="170" y="38" width="60" height="35" rx="6" fill="#f8f9fa"/>
    <text x="200" y="55" text-anchor="middle" font-size="14" font-weight="800" fill="#198754" font-family="sans-serif">3.6</text>
    <text x="200" y="66" text-anchor="middle" font-size="7" fill="#666" font-family="sans-serif">Avg GPA</text>
    <rect x="170" y="80" width="60" height="35" rx="6" fill="#f8f9fa"/>
    <text x="200" y="97" text-anchor="middle" font-size="14" font-weight="800" fill="#0d6efd" font-family="sans-serif">87%</text>
    <text x="200" y="108" text-anchor="middle" font-size="7" fill="#666" font-family="sans-serif">Retention</text>
    <rect x="170" y="122" width="60" height="26" rx="6" fill="#f8f9fa"/>
    <text x="200" y="138" text-anchor="middle" font-size="10" font-weight="700" fill="#ffc107" font-family="sans-serif">▲ 12%</text>
  </g>
  <!-- Floating metric cards -->
  <g filter="url(#s3)">
    <!-- Gauge -->
    <g transform="translate(20,40)">
      <rect x="0" y="0" width="55" height="55" rx="10" fill="#fff" opacity=".92"/>
      <path d="M28,42 A16,16 0 1,1 44,27" fill="none" stroke="#e0e0e0" stroke-width="4" stroke-linecap="round"/>
      <path d="M28,42 A16,16 0 1,0 16,18" fill="none" stroke="#198754" stroke-width="4" stroke-linecap="round"/>
      <text x="28" y="36" text-anchor="middle" font-size="9" font-weight="800" fill="#333" font-family="sans-serif">92</text>
    </g>
    <!-- Trend arrow -->
    <g transform="translate(335,50)">
      <rect x="0" y="0" width="50" height="50" rx="10" fill="#fff" opacity=".92"/>
      <polyline points="10,35 20,20 30,28 40,12" fill="none" stroke="#198754" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="38,8 44,14 38,14" fill="#198754"/>
    </g>
    <!-- Pie slice -->
    <g transform="translate(25,140)">
      <rect x="0" y="0" width="50" height="50" rx="10" fill="#fff" opacity=".92"/>
      <circle cx="25" cy="25" r="16" fill="#f0f0f0"/>
      <path d="M25,25 L25,9 A16,16 0 0,1 39,18 Z" fill="#0d6efd" opacity=".7"/>
      <path d="M25,25 L39,18 A16,16 0 0,1 38,35 Z" fill="#ffc107" opacity=".7"/>
      <path d="M25,25 L38,35 A16,16 0 0,1 25,41 Z" fill="#198754" opacity=".7"/>
    </g>
    <!-- DFW badge -->
    <g transform="translate(340,140)">
      <rect x="0" y="0" width="45" height="45" rx="10" fill="#fff" opacity=".92"/>
      <text x="23" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#dc3545" font-family="sans-serif">DFW</text>
      <text x="23" y="36" text-anchor="middle" font-size="14" font-weight="800" fill="#333" font-family="sans-serif">4%</text>
    </g>
  </g>
  <!-- Data flow lines -->
  <g stroke="#fff" stroke-width="1" opacity=".2" stroke-dasharray="4,4">
    <line x1="50" y1="210" x2="120" y2="185"/><line x1="350" y1="210" x2="280" y2="185"/>
    <line x1="100" y1="220" x2="160" y2="185"/><line x1="300" y1="220" x2="240" y2="185"/>
  </g>
  <text x="200" y="248" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#fff" opacity=".85">Performance Analytics &amp; Outcomes</text>
</svg>
