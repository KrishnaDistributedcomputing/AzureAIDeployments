<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d6efd"/><stop offset="100%" stop-color="#0dcaf0"/></linearGradient>
    <filter id="s1"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".15"/></filter>
  </defs>
  <rect width="400" height="260" fill="url(#wg)" rx="16"/>
  <!-- Laptop -->
  <g transform="translate(160,50)" filter="url(#s1)">
    <rect x="0" y="0" width="80" height="55" rx="6" fill="#fff" opacity=".95"/>
    <rect x="5" y="5" width="70" height="40" rx="3" fill="#e8f4ff"/>
    <!-- Screen lines -->
    <line x1="12" y1="15" x2="55" y2="15" stroke="#0d6efd" stroke-width="2" opacity=".5"/>
    <line x1="12" y1="22" x2="45" y2="22" stroke="#0d6efd" stroke-width="2" opacity=".3"/>
    <line x1="12" y1="29" x2="60" y2="29" stroke="#0d6efd" stroke-width="2" opacity=".4"/>
    <line x1="12" y1="36" x2="38" y2="36" stroke="#0d6efd" stroke-width="2" opacity=".2"/>
    <!-- Keyboard base -->
    <path d="M-10,55 L90,55 L85,65 L-5,65 Z" fill="#fff" opacity=".85"/>
  </g>
  <!-- Floating icons around laptop -->
  <!-- Chat bubble -->
  <g transform="translate(80,30)" filter="url(#s1)">
    <rect x="0" y="0" width="50" height="35" rx="10" fill="#fff" opacity=".92"/>
    <circle cx="14" cy="18" r="3" fill="#0d6efd"/><circle cx="25" cy="18" r="3" fill="#0dcaf0"/><circle cx="36" cy="18" r="3" fill="#0d6efd"/>
  </g>
  <!-- Calendar -->
  <g transform="translate(290,40)" filter="url(#s1)">
    <rect x="0" y="0" width="44" height="44" rx="8" fill="#fff" opacity=".92"/>
    <rect x="0" y="0" width="44" height="14" rx="8" fill="#0d6efd" opacity=".8"/>
    <rect x="0" y="8" width="44" height="6" fill="#0d6efd" opacity=".8"/>
    <g fill="#0d6efd" opacity=".5">
      <rect x="8" y="20" width="6" height="6" rx="1"/><rect x="19" y="20" width="6" height="6" rx="1"/><rect x="30" y="20" width="6" height="6" rx="1"/>
      <rect x="8" y="31" width="6" height="6" rx="1"/><rect x="19" y="31" width="6" height="6" rx="1"/>
    </g>
  </g>
  <!-- Checkmark badge -->
  <g transform="translate(100,120)" filter="url(#s1)">
    <circle cx="20" cy="20" r="20" fill="#fff" opacity=".92"/>
    <polyline points="10,20 17,27 30,14" fill="none" stroke="#198754" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Clock -->
  <g transform="translate(290,130)" filter="url(#s1)">
    <circle cx="20" cy="20" r="20" fill="#fff" opacity=".92"/>
    <circle cx="20" cy="20" r="16" fill="none" stroke="#0d6efd" stroke-width="1.5" opacity=".5"/>
    <line x1="20" y1="20" x2="20" y2="10" stroke="#0d6efd" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="28" y2="22" stroke="#0dcaf0" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="2" fill="#0d6efd"/>
  </g>
  <!-- Collaboration arrow -->
  <g transform="translate(55,180)" filter="url(#s1)">
    <rect x="0" y="0" width="50" height="35" rx="8" fill="#fff" opacity=".92"/>
    <circle cx="15" cy="14" r="6" fill="#0d6efd" opacity=".6"/>
    <circle cx="28" cy="14" r="6" fill="#0dcaf0" opacity=".6"/>
    <path d="M10,26 L40,26" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  <!-- Graph icon -->
  <g transform="translate(300,200)" filter="url(#s1)">
    <rect x="0" y="0" width="50" height="40" rx="8" fill="#fff" opacity=".92"/>
    <polyline points="8,30 18,18 28,24 42,10" fill="none" stroke="#0d6efd" stroke-width="2" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="2.5" fill="#0dcaf0"/>
    <circle cx="28" cy="24" r="2.5" fill="#0dcaf0"/>
    <circle cx="42" cy="10" r="2.5" fill="#0d6efd"/>
  </g>
  <!-- Student silhouette -->
  <g transform="translate(170,130)" opacity=".2">
    <circle cx="40" cy="10" r="12" fill="#fff"/>
    <ellipse cx="40" cy="45" rx="22" ry="18" fill="#fff"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#fff" opacity=".15">
    <circle cx="30" cy="30" r="2"/><circle cx="50" cy="50" r="1.5"/><circle cx="370" cy="30" r="2"/>
    <circle cx="350" cy="240" r="1.5"/><circle cx="30" cy="230" r="2"/><circle cx="200" cy="240" r="1.5"/>
  </g>
  <!-- Label -->
  <text x="200" y="245" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#fff" opacity=".8">Student Interactions &amp; LMS Activity</text>
</svg>
