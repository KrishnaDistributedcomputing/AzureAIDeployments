<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="lz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b5ed7"/>
      <stop offset="100%" stop-color="#198754"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="36" fill="url(#lz)" opacity="0.12"/>
  <!-- Building / Landing Zone -->
  <g transform="translate(40,40)" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round">
    <!-- Main building -->
    <rect x="-14" y="-18" width="28" height="30" rx="2" opacity="0.9"/>
    <!-- Windows -->
    <rect x="-9" y="-13" width="6" height="5" rx="1" fill="#198754" opacity="0.5"/>
    <rect x="3" y="-13" width="6" height="5" rx="1" fill="#0b5ed7" opacity="0.5"/>
    <rect x="-9" y="-3" width="6" height="5" rx="1" fill="#0b5ed7" opacity="0.5"/>
    <rect x="3" y="-3" width="6" height="5" rx="1" fill="#198754" opacity="0.5"/>
    <!-- Door -->
    <rect x="-3" y="5" width="6" height="7" rx="1"/>
    <!-- Antenna -->
    <line x1="0" y1="-18" x2="0" y2="-24"/>
    <circle cx="0" cy="-26" r="2" fill="#50e6ff" opacity="0.8"/>
    <!-- Signal waves -->
    <path d="M-6,-28 C-6,-32 6,-32 6,-28" stroke="#50e6ff" stroke-width="1" opacity="0.5"/>
    <path d="M-10,-30 C-10,-36 10,-36 10,-30" stroke="#50e6ff" stroke-width="0.8" opacity="0.3"/>
    <!-- Ground -->
    <line x1="-20" y1="12" x2="20" y2="12" stroke-width="1" opacity="0.4"/>
    <!-- Gear (automation) -->
    <circle cx="20" cy="-14" r="5" stroke="#198754" stroke-width="1.2"/>
    <circle cx="20" cy="-14" r="2" fill="#198754" opacity="0.4"/>
  </g>
  <!-- Pulse -->
  <circle cx="40" cy="14" r="4" fill="none" stroke="#50e6ff" stroke-width="0.7" opacity="0.4">
    <animate attributeName="r" values="4;10;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>