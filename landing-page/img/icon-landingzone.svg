<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="16" fill="url(#lz_bg)"/>
  <defs>
    <linearGradient id="lz_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b5ed7"/>
      <stop offset="100%" stop-color="#198754"/>
    </linearGradient>
  </defs>
  <!-- Building -->
  <g transform="translate(40,40)" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round">
    <rect x="-14" y="-16" width="28" height="28" rx="2" fill="#fff" fill-opacity="0.15"/>
    <!-- Windows -->
    <rect x="-9" y="-11" width="6" height="5" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="3" y="-11" width="6" height="5" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="-9" y="-1" width="6" height="5" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="3" y="-1" width="6" height="5" rx="1" fill="#fff" opacity="0.7"/>
    <!-- Door -->
    <rect x="-3" y="6" width="6" height="6" rx="1" fill="#fff" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="0" y1="-16" x2="0" y2="-24"/>
    <circle cx="0" cy="-26" r="2.5" fill="#fff" opacity="0.9"/>
    <!-- Signal waves -->
    <path d="M-7,-28 C-7,-33 7,-33 7,-28" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
    <path d="M-11,-31 C-11,-37 11,-37 11,-31" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <!-- Ground -->
    <line x1="-20" y1="12" x2="20" y2="12" stroke-width="1.2" opacity="0.5"/>
    <!-- Gear -->
    <circle cx="22" cy="-12" r="5.5" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="22" cy="-12" r="2" fill="#fff" opacity="0.5"/>
  </g>
</svg>