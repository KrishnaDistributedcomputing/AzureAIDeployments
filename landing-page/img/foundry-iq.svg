<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#198754"/><stop offset="100%" stop-color="#20c997"/></linearGradient>
    <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".15"/></filter>
  </defs>
  <rect width="400" height="260" fill="url(#fg)" rx="16"/>
  <!-- Open Book -->
  <g transform="translate(140,40)" filter="url(#s2)">
    <path d="M60,10 Q30,10 5,25 L5,120 Q30,105 60,105 Z" fill="#fff" opacity=".95"/>
    <path d="M60,10 Q90,10 115,25 L115,120 Q90,105 60,105 Z" fill="#fff" opacity=".9"/>
    <!-- Page lines left -->
    <line x1="15" y1="40" x2="50" y2="40" stroke="#198754" stroke-width="1.5" opacity=".3"/>
    <line x1="15" y1="50" x2="45" y2="50" stroke="#198754" stroke-width="1.5" opacity=".25"/>
    <line x1="15" y1="60" x2="52" y2="60" stroke="#198754" stroke-width="1.5" opacity=".3"/>
    <line x1="15" y1="70" x2="40" y2="70" stroke="#198754" stroke-width="1.5" opacity=".2"/>
    <line x1="15" y1="80" x2="48" y2="80" stroke="#198754" stroke-width="1.5" opacity=".25"/>
    <line x1="15" y1="90" x2="42" y2="90" stroke="#198754" stroke-width="1.5" opacity=".2"/>
    <!-- Page lines right -->
    <line x1="70" y1="40" x2="105" y2="40" stroke="#198754" stroke-width="1.5" opacity=".3"/>
    <line x1="70" y1="50" x2="100" y2="50" stroke="#198754" stroke-width="1.5" opacity=".25"/>
    <line x1="70" y1="60" x2="107" y2="60" stroke="#198754" stroke-width="1.5" opacity=".3"/>
    <line x1="70" y1="70" x2="95" y2="70" stroke="#198754" stroke-width="1.5" opacity=".2"/>
    <line x1="70" y1="80" x2="102" y2="80" stroke="#198754" stroke-width="1.5" opacity=".25"/>
    <!-- Spine -->
    <line x1="60" y1="10" x2="60" y2="105" stroke="#198754" stroke-width="1" opacity=".3"/>
  </g>
  <!-- Knowledge Graph Nodes radiating from book -->
  <g filter="url(#s2)">
    <!-- Node connections -->
    <line x1="200" y1="80" x2="70" y2="50" stroke="#fff" stroke-width="1.5" opacity=".25"/>
    <line x1="200" y1="80" x2="340" y2="40" stroke="#fff" stroke-width="1.5" opacity=".25"/>
    <line x1="200" y1="80" x2="50" y2="150" stroke="#fff" stroke-width="1.5" opacity=".25"/>
    <line x1="200" y1="80" x2="350" y2="140" stroke="#fff" stroke-width="1.5" opacity=".25"/>
    <line x1="200" y1="140" x2="80" y2="200" stroke="#fff" stroke-width="1.5" opacity=".25"/>
    <line x1="200" y1="140" x2="320" y2="210" stroke="#fff" stroke-width="1.5" opacity=".25"/>
    <line x1="70" y1="50" x2="50" y2="150" stroke="#fff" stroke-width="1" opacity=".15"/>
    <line x1="340" y1="40" x2="350" y2="140" stroke="#fff" stroke-width="1" opacity=".15"/>
    <line x1="50" y1="150" x2="80" y2="200" stroke="#fff" stroke-width="1" opacity=".15"/>
    <line x1="350" y1="140" x2="320" y2="210" stroke="#fff" stroke-width="1" opacity=".15"/>
    <!-- Policy Doc node -->
    <g transform="translate(45,30)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="#fff" opacity=".92"/>
      <rect x="8" y="8" width="20" height="3" rx="1" fill="#198754" opacity=".5"/>
      <rect x="8" y="14" width="34" height="2" rx="1" fill="#198754" opacity=".3"/>
      <rect x="8" y="19" width="30" height="2" rx="1" fill="#198754" opacity=".3"/>
      <rect x="8" y="24" width="34" height="2" rx="1" fill="#198754" opacity=".3"/>
      <rect x="8" y="29" width="20" height="2" rx="1" fill="#198754" opacity=".3"/>
    </g>
    <!-- Research node -->
    <g transform="translate(315,20)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="#fff" opacity=".92"/>
      <circle cx="25" cy="15" r="8" fill="none" stroke="#198754" stroke-width="1.5" opacity=".5"/>
      <circle cx="25" cy="15" r="3" fill="#20c997" opacity=".6"/>
      <rect x="8" y="28" width="34" height="2" rx="1" fill="#198754" opacity=".3"/>
      <rect x="12" y="33" width="26" height="2" rx="1" fill="#198754" opacity=".3"/>
    </g>
    <!-- Diploma node -->
    <g transform="translate(25,130)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="#fff" opacity=".92"/>
      <rect x="10" y="6" width="30" height="22" rx="2" fill="none" stroke="#198754" stroke-width="1.5" opacity=".5"/>
      <circle cx="25" cy="17" r="5" fill="none" stroke="#20c997" stroke-width="1"/>
      <line x1="15" y1="25" x2="35" y2="25" stroke="#198754" stroke-width="1" opacity=".4"/>
    </g>
    <!-- Career node -->
    <g transform="translate(325,120)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="#fff" opacity=".92"/>
      <rect x="10" y="8" width="12" height="22" rx="2" fill="#198754" opacity=".3"/>
      <rect x="25" y="14" width="12" height="16" rx="2" fill="#20c997" opacity=".4"/>
      <polyline points="10,30 18,10 28,20 38,6" fill="none" stroke="#198754" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
    </g>
    <!-- Accreditation node -->
    <g transform="translate(55,180)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="#fff" opacity=".92"/>
      <polygon points="25,6 30,16 40,18 32,26 34,36 25,31 16,36 18,26 10,18 20,16" fill="#ffc107" opacity=".5" stroke="#198754" stroke-width=".5"/>
    </g>
    <!-- Catalog node -->
    <g transform="translate(295,190)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="#fff" opacity=".92"/>
      <rect x="12" y="6" width="26" height="28" rx="3" fill="none" stroke="#198754" stroke-width="1.5" opacity=".5"/>
      <line x1="12" y1="12" x2="38" y2="12" stroke="#198754" stroke-width="1" opacity=".3"/>
      <line x1="17" y1="18" x2="33" y2="18" stroke="#198754" stroke-width="1" opacity=".2"/>
      <line x1="17" y1="23" x2="33" y2="23" stroke="#198754" stroke-width="1" opacity=".2"/>
      <line x1="17" y1="28" x2="28" y2="28" stroke="#198754" stroke-width="1" opacity=".2"/>
    </g>
  </g>
  <!-- Decorative -->
  <g fill="#fff" opacity=".12">
    <circle cx="200" cy="230" r="3"/><circle cx="180" cy="220" r="1.5"/><circle cx="220" cy="215" r="2"/>
  </g>
  <text x="200" y="248" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#fff" opacity=".8">Curriculum, Policies &amp; Research</text>
</svg>
