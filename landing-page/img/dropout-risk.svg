<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fef2f2"/><stop offset="100%" stop-color="#fce7f3"/></linearGradient>
    <filter id="s5"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".1"/></filter>
  </defs>
  <rect width="400" height="220" fill="url(#rg1)" rx="14"/>
  <!-- Risk Dashboard -->
  <g transform="translate(30,20)" filter="url(#s5)">
    <rect x="0" y="0" width="200" height="175" rx="14" fill="#fff"/>
    <text x="100" y="20" text-anchor="middle" font-size="9" font-weight="700" fill="#333" font-family="sans-serif">At-Risk Student Dashboard</text>
    <!-- Risk Gauge -->
    <g transform="translate(60,30)">
      <path d="M10,60 A40,40 0 1,1 70,60" fill="none" stroke="#e0e0e0" stroke-width="8" stroke-linecap="round"/>
      <path d="M10,60 A40,40 0 0,1 25,25" fill="none" stroke="#198754" stroke-width="8" stroke-linecap="round"/>
      <path d="M25,25 A40,40 0 0,1 55,25" fill="none" stroke="#ffc107" stroke-width="8" stroke-linecap="round"/>
      <path d="M55,25 A40,40 0 0,1 70,60" fill="none" stroke="#dc3545" stroke-width="8" stroke-linecap="round"/>
      <!-- Needle -->
      <line x1="40" y1="55" x2="58" y2="30" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      <circle cx="40" cy="55" r="4" fill="#333"/>
      <text x="40" y="78" text-anchor="middle" font-size="18" font-weight="800" fill="#dc3545" font-family="sans-serif">72</text>
      <text x="40" y="88" text-anchor="middle" font-size="7" fill="#666" font-family="sans-serif">Risk Score</text>
    </g>
    <!-- Student risk list -->
    <g transform="translate(10,110)">
      <rect x="0" y="0" width="180" height="22" rx="4" fill="#fef2f2"/>
      <circle cx="12" cy="11" r="5" fill="#dc3545" opacity=".3"/>
      <text x="22" y="14" font-size="7" fill="#333" font-family="sans-serif">J. Martinez — Risk: 82 — Missed 4 classes</text>
      <rect x="0" y="26" width="180" height="22" rx="4" fill="#fefce8"/>
      <circle cx="12" cy="37" r="5" fill="#ffc107" opacity=".3"/>
      <text x="22" y="40" font-size="7" fill="#333" font-family="sans-serif">A. Chen — Risk: 45 — GPA declining</text>
    </g>
  </g>
  <!-- Shield / Safety Net -->
  <g transform="translate(260,20)" filter="url(#s5)">
    <rect x="0" y="0" width="120" height="175" rx="14" fill="#fff"/>
    <!-- Shield icon -->
    <g transform="translate(25,15)">
      <path d="M35,5 L65,15 L65,45 Q65,70 35,85 Q5,70 5,45 L5,15 Z" fill="#dc3545" opacity=".1" stroke="#dc3545" stroke-width="2"/>
      <path d="M35,5 L65,15 L65,45 Q65,70 35,85 Q5,70 5,45 L5,15 Z" fill="none" stroke="#dc3545" stroke-width="2"/>
      <!-- Check inside shield -->
      <polyline points="20,42 30,52 50,32" fill="none" stroke="#dc3545" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Intervention arrows -->
    <text x="60" y="115" text-anchor="middle" font-size="8" font-weight="700" fill="#333" font-family="sans-serif">Interventions</text>
    <g transform="translate(10,125)">
      <rect x="0" y="0" width="100" height="16" rx="4" fill="#d1fae5"/>
      <text x="50" y="11" text-anchor="middle" font-size="6.5" fill="#198754" font-family="sans-serif">✓ Advisor Meeting Set</text>
    </g>
    <g transform="translate(10,145)">
      <rect x="0" y="0" width="100" height="16" rx="4" fill="#dbeafe"/>
      <text x="50" y="11" text-anchor="middle" font-size="6.5" fill="#0d6efd" font-family="sans-serif">✓ Tutoring Assigned</text>
    </g>
  </g>
  <!-- Alert bell -->
  <g transform="translate(240,10)" opacity=".6">
    <circle cx="12" cy="10" r="10" fill="#dc3545" opacity=".2"/>
    <text x="12" y="14" text-anchor="middle" font-size="12" fill="#dc3545">🔔</text>
    <circle cx="18" cy="5" r="4" fill="#dc3545"/>
    <text x="18" y="7" text-anchor="middle" font-size="5" font-weight="700" fill="#fff" font-family="sans-serif">3</text>
  </g>
  <!-- Risk tier bar at bottom -->
  <g transform="translate(30,200)">
    <rect x="0" y="0" width="85" height="8" rx="4" fill="#198754" opacity=".4"/>
    <rect x="85" y="0" width="85" height="8" rx="0" fill="#ffc107" opacity=".4"/>
    <rect x="170" y="0" width="85" height="8" rx="0" fill="#fd7e14" opacity=".4"/>
    <rect x="255" y="0" width="85" height="8" rx="4" fill="#dc3545" opacity=".4"/>
  </g>
</svg>
