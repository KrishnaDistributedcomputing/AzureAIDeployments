<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="ag1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
    <filter id="s4"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".1"/></filter>
  </defs>
  <rect width="400" height="220" fill="url(#ag1)" rx="14"/>
  <!-- Chat interface -->
  <g transform="translate(30,20)" filter="url(#s4)">
    <rect x="0" y="0" width="160" height="180" rx="14" fill="#fff"/>
    <rect x="0" y="0" width="160" height="32" rx="14" fill="#0d6efd"/>
    <rect x="0" y="18" width="160" height="14" fill="#0d6efd"/>
    <circle cx="22" cy="16" r="8" fill="#fff" opacity=".3"/>
    <text x="40" y="20" font-size="10" font-weight="700" fill="#fff" font-family="sans-serif">AI Advisor</text>
    <circle cx="140" cy="16" r="3" fill="#198754"/>
    <!-- User message -->
    <rect x="40" y="42" width="110" height="28" rx="10" fill="#0d6efd" opacity=".1"/>
    <text x="50" y="56" font-size="7" fill="#333" font-family="sans-serif">What electives for ML?</text>
    <text x="50" y="64" font-size="6" fill="#999" font-family="sans-serif">CS Junior • GPA 3.7</text>
    <!-- AI response -->
    <rect x="10" y="78" width="130" height="45" rx="10" fill="#f0f9ff"/>
    <rect x="10" y="78" width="4" height="45" rx="2" fill="#0d6efd"/>
    <text x="22" y="92" font-size="7" fill="#333" font-family="sans-serif">Based on your profile:</text>
    <text x="22" y="102" font-size="6.5" fill="#0d6efd" font-family="sans-serif">• CS 410 Machine Learning</text>
    <text x="22" y="112" font-size="6.5" fill="#0d6efd" font-family="sans-serif">• STAT 400 Applied Stats</text>
    <text x="22" y="120" font-size="6" fill="#198754" font-family="sans-serif">  ✓ Matches your strength</text>
    <!-- Input bar -->
    <rect x="10" y="135" width="140" height="25" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="22" y="150" font-size="7" fill="#aaa" font-family="sans-serif">Ask about courses...</text>
    <circle cx="138" cy="147" r="8" fill="#0d6efd"/>
    <polygon points="135,147 141,147 138,142" fill="#fff"/>
  </g>
  <!-- Degree Pathway visualization -->
  <g transform="translate(210,25)" filter="url(#s4)">
    <rect x="0" y="0" width="170" height="170" rx="14" fill="#fff"/>
    <text x="85" y="20" text-anchor="middle" font-size="9" font-weight="700" fill="#333" font-family="sans-serif">Degree Pathway Map</text>
    <!-- Pathway nodes -->
    <circle cx="40" cy="45" r="14" fill="#0d6efd" opacity=".15" stroke="#0d6efd" stroke-width="1.5"/>
    <text x="40" y="48" text-anchor="middle" font-size="6" font-weight="700" fill="#0d6efd" font-family="sans-serif">CS101</text>
    <circle cx="110" cy="45" r="14" fill="#0d6efd" opacity=".15" stroke="#0d6efd" stroke-width="1.5"/>
    <text x="110" y="48" text-anchor="middle" font-size="6" font-weight="700" fill="#0d6efd" font-family="sans-serif">CS201</text>
    <circle cx="40" cy="85" r="14" fill="#198754" opacity=".15" stroke="#198754" stroke-width="1.5"/>
    <text x="40" y="88" text-anchor="middle" font-size="6" font-weight="700" fill="#198754" font-family="sans-serif">MATH</text>
    <circle cx="110" cy="85" r="14" fill="#6f42c1" opacity=".15" stroke="#6f42c1" stroke-width="1.5"/>
    <text x="110" y="88" text-anchor="middle" font-size="6" font-weight="700" fill="#6f42c1" font-family="sans-serif">CS301</text>
    <circle cx="75" cy="125" r="16" fill="#ffc107" opacity=".2" stroke="#ffc107" stroke-width="2"/>
    <text x="75" y="123" text-anchor="middle" font-size="6" font-weight="700" fill="#e8a317" font-family="sans-serif">CS410</text>
    <text x="75" y="131" text-anchor="middle" font-size="5" fill="#e8a317" font-family="sans-serif">ML</text>
    <!-- Arrows -->
    <line x1="54" y1="45" x2="96" y2="45" stroke="#0d6efd" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="110" y1="59" x2="110" y2="71" stroke="#6f42c1" stroke-width="1.5"/>
    <line x1="40" y1="59" x2="40" y2="71" stroke="#198754" stroke-width="1.5"/>
    <line x1="52" y1="93" x2="63" y2="115" stroke="#ffc107" stroke-width="1.5"/>
    <line x1="100" y1="97" x2="87" y2="115" stroke="#ffc107" stroke-width="1.5"/>
    <!-- Graduation cap at bottom -->
    <g transform="translate(62,148)">
      <polygon points="13,0 0,7 13,14 26,7" fill="#ffc107"/>
      <line x1="13" y1="7" x2="13" y2="18" stroke="#ffc107" stroke-width="1.5"/>
    </g>
  </g>
  <!-- Sparkle accents -->
  <g fill="#0d6efd" opacity=".15">
    <circle cx="200" cy="10" r="2"/><circle cx="195" cy="210" r="1.5"/><circle cx="15" cy="110" r="2"/>
    <circle cx="390" cy="110" r="2"/><circle cx="390" cy="15" r="1.5"/>
  </g>
</svg>
