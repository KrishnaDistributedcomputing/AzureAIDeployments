<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="16" fill="url(#edu_bg)"/>
  <defs>
    <linearGradient id="edu_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6f42c1"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
  </defs>
  <!-- Graduation cap -->
  <g transform="translate(40,36)" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round">
    <polygon points="0,-14 24,-4 0,6 -24,-4" fill="#fff" fill-opacity="0.25" stroke="#fff"/>
    <!-- Tassel -->
    <line x1="24" y1="-4" x2="24" y2="8"/>
    <circle cx="24" cy="10" r="2.5" fill="#ffc107"/>
    <!-- Board sides -->
    <line x1="-15" y1="0" x2="-15" y2="12"/>
    <line x1="15" y1="0" x2="15" y2="12"/>
    <path d="M-15,12 C-15,19 15,19 15,12" stroke-width="1.5"/>
  </g>
  <!-- Sparkles -->
  <g fill="#fff" opacity="0.8">
    <circle cx="16" cy="16" r="2.5">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="18" r="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="62" r="2.5">
      <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Brain dots -->
  <g opacity="0.5">
    <circle cx="27" cy="58" r="1.5" fill="#fff"/>
    <circle cx="53" cy="58" r="1.5" fill="#fff"/>
    <circle cx="40" cy="64" r="1.5" fill="#fff"/>
    <line x1="27" y1="58" x2="40" y2="64" stroke="#fff" stroke-width="0.8"/>
    <line x1="53" y1="58" x2="40" y2="64" stroke="#fff" stroke-width="0.8"/>
    <line x1="27" y1="58" x2="53" y2="58" stroke="#fff" stroke-width="0.8"/>
  </g>
</svg>