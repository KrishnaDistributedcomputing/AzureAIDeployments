<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#50e6ff"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <circle cx="40" cy="40" r="36" fill="url(#bg)" opacity="0.15"/>
  <circle cx="40" cy="40" r="28" fill="url(#bg)" opacity="0.1"/>
  <!-- Central node -->
  <circle cx="40" cy="40" r="10" fill="url(#bg)" filter="url(#g)"/>
  <text x="40" y="44" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="Segoe UI,sans-serif">10</text>
  <!-- Spoke nodes -->
  <circle cx="40" cy="12" r="5" fill="#50e6ff" opacity="0.8"/>
  <circle cx="66" cy="26" r="5" fill="#0078d4" opacity="0.8"/>
  <circle cx="66" cy="54" r="5" fill="#50e6ff" opacity="0.8"/>
  <circle cx="40" cy="68" r="5" fill="#0078d4" opacity="0.8"/>
  <circle cx="14" cy="54" r="5" fill="#50e6ff" opacity="0.8"/>
  <circle cx="14" cy="26" r="5" fill="#0078d4" opacity="0.8"/>
  <!-- Connection lines -->
  <g stroke="#50e6ff" stroke-width="1" opacity="0.5">
    <line x1="40" y1="30" x2="40" y2="12"/>
    <line x1="48" y1="34" x2="66" y2="26"/>
    <line x1="48" y1="46" x2="66" y2="54"/>
    <line x1="40" y1="50" x2="40" y2="68"/>
    <line x1="32" y1="46" x2="14" y2="54"/>
    <line x1="32" y1="34" x2="14" y2="26"/>
  </g>
  <!-- Pulse -->
  <circle cx="40" cy="40" r="14" fill="none" stroke="#50e6ff" stroke-width="0.8" opacity="0.4">
    <animate attributeName="r" values="14;24;14" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>