<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="16" fill="url(#p_bg)"/>
  <defs>
    <linearGradient id="p_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#50e6ff"/>
    </linearGradient>
  </defs>
  <!-- Central node -->
  <circle cx="40" cy="40" r="11" fill="#fff" opacity="0.95"/>
  <text x="40" y="45" text-anchor="middle" fill="#0078d4" font-size="12" font-weight="800" font-family="Segoe UI,sans-serif">10</text>
  <!-- Spoke nodes -->
  <circle cx="40" cy="12" r="5" fill="#fff" opacity="0.9"/>
  <circle cx="66" cy="26" r="5" fill="#fff" opacity="0.85"/>
  <circle cx="66" cy="54" r="5" fill="#fff" opacity="0.9"/>
  <circle cx="40" cy="68" r="5" fill="#fff" opacity="0.85"/>
  <circle cx="14" cy="54" r="5" fill="#fff" opacity="0.9"/>
  <circle cx="14" cy="26" r="5" fill="#fff" opacity="0.85"/>
  <!-- Connection lines -->
  <g stroke="#fff" stroke-width="1.5" opacity="0.6">
    <line x1="40" y1="29" x2="40" y2="17"/>
    <line x1="49" y1="34" x2="61" y2="28"/>
    <line x1="49" y1="46" x2="61" y2="52"/>
    <line x1="40" y1="51" x2="40" y2="63"/>
    <line x1="31" y1="46" x2="19" y2="52"/>
    <line x1="31" y1="34" x2="19" y2="28"/>
  </g>
  <!-- Pulse -->
  <circle cx="40" cy="40" r="16" fill="none" stroke="#fff" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="16;26;16" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>