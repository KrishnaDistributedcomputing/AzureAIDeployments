<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="hg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="40%" stop-color="#6f42c1"/>
      <stop offset="70%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#0dcaf0"/>
    </linearGradient>
    <linearGradient id="hg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#6f42c1" stop-opacity=".1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="500" fill="url(#hg1)"/>
  <!-- Floating circles -->
  <circle cx="950" cy="120" r="180" fill="rgba(255,255,255,.03)"/>
  <circle cx="1050" cy="350" r="120" fill="rgba(255,255,255,.04)"/>
  <circle cx="200" cy="400" r="200" fill="rgba(255,255,255,.02)"/>
  <!-- Grid pattern -->
  <g opacity=".06" stroke="#fff" stroke-width=".5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/><line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>
  <!-- University Building Silhouette -->
  <g transform="translate(750,100)" opacity=".15">
    <rect x="0" y="120" width="300" height="220" rx="4" fill="#fff"/>
    <rect x="30" y="80" width="240" height="40" rx="4" fill="#fff"/>
    <rect x="100" y="40" width="100" height="40" rx="4" fill="#fff"/>
    <rect x="130" y="10" width="40" height="30" rx="2" fill="#fff"/>
    <!-- Windows -->
    <rect x="30" y="150" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <rect x="85" y="150" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <rect x="180" y="150" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <rect x="235" y="150" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <rect x="30" y="220" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <rect x="85" y="220" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <rect x="180" y="220" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <rect x="235" y="220" width="35" height="45" rx="3" fill="rgba(0,0,0,.3)"/>
    <!-- Door -->
    <rect x="120" y="270" width="60" height="70" rx="30" fill="rgba(0,0,0,.3)"/>
    <!-- Columns -->
    <rect x="50" y="80" width="12" height="260" fill="rgba(255,255,255,.5)"/>
    <rect x="238" y="80" width="12" height="260" fill="rgba(255,255,255,.5)"/>
  </g>
  <!-- Neural Network Nodes -->
  <g filter="url(#glow)">
    <!-- Layer 1 -->
    <circle cx="680" cy="80" r="8" fill="#0dcaf0" opacity=".9"/>
    <circle cx="680" cy="160" r="8" fill="#0dcaf0" opacity=".9"/>
    <circle cx="680" cy="240" r="8" fill="#0dcaf0" opacity=".9"/>
    <circle cx="680" cy="320" r="8" fill="#0dcaf0" opacity=".9"/>
    <!-- Layer 2 -->
    <circle cx="780" cy="120" r="10" fill="#a78bfa" opacity=".9"/>
    <circle cx="780" cy="200" r="10" fill="#a78bfa" opacity=".9"/>
    <circle cx="780" cy="280" r="10" fill="#a78bfa" opacity=".9"/>
    <!-- Layer 3 -->
    <circle cx="880" cy="160" r="12" fill="#0d6efd" opacity=".9"/>
    <circle cx="880" cy="240" r="12" fill="#0d6efd" opacity=".9"/>
    <!-- Output -->
    <circle cx="960" cy="200" r="14" fill="#fff" opacity=".9"/>
  </g>
  <!-- Connections -->
  <g stroke="rgba(255,255,255,.15)" stroke-width="1.5">
    <line x1="688" y1="80" x2="770" y2="120"/><line x1="688" y1="80" x2="770" y2="200"/><line x1="688" y1="80" x2="770" y2="280"/>
    <line x1="688" y1="160" x2="770" y2="120"/><line x1="688" y1="160" x2="770" y2="200"/><line x1="688" y1="160" x2="770" y2="280"/>
    <line x1="688" y1="240" x2="770" y2="120"/><line x1="688" y1="240" x2="770" y2="200"/><line x1="688" y1="240" x2="770" y2="280"/>
    <line x1="688" y1="320" x2="770" y2="120"/><line x1="688" y1="320" x2="770" y2="200"/><line x1="688" y1="320" x2="770" y2="280"/>
    <line x1="790" y1="120" x2="868" y2="160"/><line x1="790" y1="120" x2="868" y2="240"/>
    <line x1="790" y1="200" x2="868" y2="160"/><line x1="790" y1="200" x2="868" y2="240"/>
    <line x1="790" y1="280" x2="868" y2="160"/><line x1="790" y1="280" x2="868" y2="240"/>
    <line x1="892" y1="160" x2="946" y2="200"/><line x1="892" y1="240" x2="946" y2="200"/>
  </g>
  <!-- Floating Data Icons -->
  <g filter="url(#glow)" opacity=".8">
    <!-- Graduation Cap -->
    <g transform="translate(580,60)">
      <polygon points="25,8 0,20 25,32 50,20" fill="#ffc107" opacity=".9"/>
      <line x1="25" y1="20" x2="25" y2="40" stroke="#ffc107" stroke-width="2"/>
      <rect x="18" y="32" width="14" height="8" rx="2" fill="none" stroke="#ffc107" stroke-width="1.5"/>
    </g>
    <!-- Chart -->
    <g transform="translate(1050,60)">
      <rect x="0" y="20" width="8" height="20" rx="2" fill="#0dcaf0"/>
      <rect x="12" y="10" width="8" height="30" rx="2" fill="#a78bfa"/>
      <rect x="24" y="0" width="8" height="40" rx="2" fill="#0d6efd"/>
    </g>
    <!-- Atom/AI symbol -->
    <g transform="translate(1100,250)">
      <circle cx="20" cy="20" r="4" fill="#0dcaf0"/>
      <ellipse cx="20" cy="20" rx="18" ry="8" fill="none" stroke="#0dcaf0" stroke-width="1.5" transform="rotate(0,20,20)"/>
      <ellipse cx="20" cy="20" rx="18" ry="8" fill="none" stroke="#a78bfa" stroke-width="1.5" transform="rotate(60,20,20)"/>
      <ellipse cx="20" cy="20" rx="18" ry="8" fill="none" stroke="#0d6efd" stroke-width="1.5" transform="rotate(120,20,20)"/>
    </g>
    <!-- Book -->
    <g transform="translate(620,380)">
      <rect x="0" y="0" width="30" height="35" rx="3" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <line x1="15" y1="0" x2="15" y2="35" stroke="#a78bfa" stroke-width="1"/>
      <line x1="5" y1="10" x2="12" y2="10" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
      <line x1="5" y1="15" x2="12" y2="15" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
      <line x1="18" y1="10" x2="25" y2="10" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
      <line x1="18" y1="15" x2="25" y2="15" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
    </g>
  </g>
  <!-- Data stream particles -->
  <g fill="#0dcaf0" opacity=".5">
    <circle cx="640" cy="140" r="2"><animate attributeName="cy" from="140" to="100" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" from=".5" to="0" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="300" r="2"><animate attributeName="cy" from="300" to="260" dur="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" from=".5" to="0" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="100" r="2"><animate attributeName="cy" from="100" to="60" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" from=".5" to="0" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="340" r="1.5"><animate attributeName="cy" from="340" to="300" dur="3.5s" repeatCount="indefinite"/><animate attributeName="opacity" from=".4" to="0" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="150" r="2"><animate attributeName="cy" from="150" to="110" dur="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" from=".5" to="0" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#a78bfa" opacity=".4">
    <circle cx="660" cy="260" r="1.5"><animate attributeName="cx" from="660" to="700" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" from=".4" to="0" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="80" r="1.5"><animate attributeName="cx" from="850" to="890" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" from=".4" to="0" dur="3s" repeatCount="indefinite"/></circle>
  </g>
</svg>
