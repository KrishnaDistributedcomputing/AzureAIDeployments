<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ug1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f5f3ff"/><stop offset="100%" stop-color="#ede9fe"/></linearGradient>
    <linearGradient id="ug2" x1="50%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="#6f42c1" stop-opacity=".05"/><stop offset="100%" stop-color="#6f42c1" stop-opacity=".2"/></linearGradient>
    <filter id="s7"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".12"/></filter>
    <filter id="glow3"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#ug1)" rx="14"/>
  <!-- Central AI Brain -->
  <g transform="translate(165,95)" filter="url(#glow3)">
    <circle cx="35" cy="35" r="38" fill="url(#ug2)" stroke="#6f42c1" stroke-width="2"/>
    <circle cx="35" cy="35" r="28" fill="#fff" opacity=".9"/>
    <!-- Brain circuit pattern -->
    <circle cx="35" cy="28" r="3" fill="#6f42c1" opacity=".7"/>
    <circle cx="25" cy="38" r="3" fill="#0d6efd" opacity=".7"/>
    <circle cx="45" cy="38" r="3" fill="#0d6efd" opacity=".7"/>
    <circle cx="35" cy="48" r="3" fill="#6f42c1" opacity=".7"/>
    <line x1="35" y1="28" x2="25" y2="38" stroke="#6f42c1" stroke-width="1.5" opacity=".4"/>
    <line x1="35" y1="28" x2="45" y2="38" stroke="#6f42c1" stroke-width="1.5" opacity=".4"/>
    <line x1="25" y1="38" x2="35" y2="48" stroke="#0d6efd" stroke-width="1.5" opacity=".4"/>
    <line x1="45" y1="38" x2="35" y2="48" stroke="#0d6efd" stroke-width="1.5" opacity=".4"/>
    <line x1="25" y1="38" x2="45" y2="38" stroke="#a78bfa" stroke-width="1" opacity=".3"/>
    <text x="35" y="65" text-anchor="middle" font-size="7" font-weight="700" fill="#6f42c1" font-family="sans-serif">Azure AI</text>
  </g>
  <!-- Data Source Nodes - converging to center -->
  <!-- LMS -->
  <g transform="translate(15,20)" filter="url(#s7)">
    <rect x="0" y="0" width="80" height="55" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="80" height="16" rx="10" fill="#0d6efd" opacity=".15"/>
    <rect x="0" y="8" width="80" height="8" fill="#0d6efd" opacity=".15"/>
    <text x="40" y="12" text-anchor="middle" font-size="7" font-weight="700" fill="#0d6efd" font-family="sans-serif">LMS Data</text>
    <rect x="8" y="22" width="40" height="3" rx="1" fill="#0d6efd" opacity=".3"/>
    <rect x="8" y="28" width="55" height="3" rx="1" fill="#0d6efd" opacity=".2"/>
    <rect x="8" y="34" width="35" height="3" rx="1" fill="#0d6efd" opacity=".3"/>
    <circle cx="68" cy="40" r="4" fill="#198754" opacity=".5"/>
    <text x="68" y="43" text-anchor="middle" font-size="5" fill="#fff" font-family="sans-serif">✓</text>
  </g>
  <!-- Student Records -->
  <g transform="translate(305,20)" filter="url(#s7)">
    <rect x="0" y="0" width="80" height="55" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="80" height="16" rx="10" fill="#198754" opacity=".15"/>
    <rect x="0" y="8" width="80" height="8" fill="#198754" opacity=".15"/>
    <text x="40" y="12" text-anchor="middle" font-size="7" font-weight="700" fill="#198754" font-family="sans-serif">SIS Records</text>
    <circle cx="25" cy="32" r="8" fill="#198754" opacity=".1" stroke="#198754" stroke-width="1"/>
    <circle cx="25" cy="30" r="3" fill="#198754" opacity=".4"/>
    <rect x="20" y="36" width="10" height="5" rx="2" fill="#198754" opacity=".3"/>
    <rect x="42" y="24" width="30" height="3" rx="1" fill="#198754" opacity=".3"/>
    <rect x="42" y="30" width="25" height="3" rx="1" fill="#198754" opacity=".2"/>
    <rect x="42" y="36" width="30" height="3" rx="1" fill="#198754" opacity=".3"/>
    <rect x="42" y="42" width="20" height="3" rx="1" fill="#198754" opacity=".2"/>
  </g>
  <!-- Research -->
  <g transform="translate(0,140)" filter="url(#s7)">
    <rect x="0" y="0" width="80" height="55" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="80" height="16" rx="10" fill="#6f42c1" opacity=".15"/>
    <rect x="0" y="8" width="80" height="8" fill="#6f42c1" opacity=".15"/>
    <text x="40" y="12" text-anchor="middle" font-size="7" font-weight="700" fill="#6f42c1" font-family="sans-serif">Research</text>
    <rect x="10" y="22" width="24" height="28" rx="3" fill="none" stroke="#6f42c1" stroke-width="1" opacity=".4"/>
    <rect x="46" y="22" width="24" height="28" rx="3" fill="none" stroke="#6f42c1" stroke-width="1" opacity=".4"/>
    <line x1="15" y1="28" x2="28" y2="28" stroke="#6f42c1" stroke-width="1" opacity=".3"/>
    <line x1="15" y1="33" x2="26" y2="33" stroke="#6f42c1" stroke-width="1" opacity=".2"/>
    <line x1="51" y1="28" x2="64" y2="28" stroke="#6f42c1" stroke-width="1" opacity=".3"/>
    <line x1="51" y1="33" x2="62" y2="33" stroke="#6f42c1" stroke-width="1" opacity=".2"/>
  </g>
  <!-- Financial -->
  <g transform="translate(320,140)" filter="url(#s7)">
    <rect x="0" y="0" width="80" height="55" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="80" height="16" rx="10" fill="#ffc107" opacity=".2"/>
    <rect x="0" y="8" width="80" height="8" fill="#ffc107" opacity=".2"/>
    <text x="40" y="12" text-anchor="middle" font-size="7" font-weight="700" fill="#e8a317" font-family="sans-serif">Financial</text>
    <text x="40" y="35" text-anchor="middle" font-size="16" font-weight="800" fill="#e8a317" opacity=".4" font-family="sans-serif">$</text>
    <rect x="10" y="40" width="25" height="8" rx="2" fill="#198754" opacity=".3"/>
    <rect x="45" y="40" width="25" height="8" rx="2" fill="#dc3545" opacity=".2"/>
  </g>
  <!-- Career Stats -->
  <g transform="translate(160,230)" filter="url(#s7)">
    <rect x="0" y="0" width="80" height="50" rx="10" fill="#fff"/>
    <rect x="0" y="0" width="80" height="16" rx="10" fill="#dc3545" opacity=".1"/>
    <rect x="0" y="8" width="80" height="8" fill="#dc3545" opacity=".1"/>
    <text x="40" y="12" text-anchor="middle" font-size="7" font-weight="700" fill="#dc3545" font-family="sans-serif">Career Data</text>
    <polyline points="12,38 25,28 38,33 52,22 65,26" fill="none" stroke="#198754" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="46" text-anchor="middle" font-size="6" fill="#666" font-family="sans-serif">92% placed</text>
  </g>
  <!-- Data flow arrows to center -->
  <g stroke="#6f42c1" stroke-width="1.5" opacity=".35" stroke-dasharray="5,3">
    <!-- LMS to center -->
    <line x1="95" y1="50" x2="170" y2="115"/>
    <!-- SIS to center -->
    <line x1="305" y1="50" x2="235" y2="115"/>
    <!-- Research to center -->
    <line x1="80" y1="168" x2="170" y2="140"/>
    <!-- Financial to center -->
    <line x1="320" y1="168" x2="235" y2="140"/>
    <!-- Career to center -->
    <line x1="200" y1="230" x2="200" y2="170"/>
  </g>
  <!-- Animated particles on streams -->
  <g fill="#6f42c1" opacity=".5">
    <circle r="2.5"><animate attributeName="cx" from="95" to="170" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" from="50" to="115" dur="2s" repeatCount="indefinite"/></circle>
    <circle r="2.5"><animate attributeName="cx" from="305" to="235" dur="2.5s" repeatCount="indefinite"/><animate attributeName="cy" from="50" to="115" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle r="2.5"><animate attributeName="cx" from="80" to="170" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" from="168" to="140" dur="3s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#0d6efd" opacity=".4">
    <circle r="2"><animate attributeName="cx" from="320" to="235" dur="2.8s" repeatCount="indefinite"/><animate attributeName="cy" from="168" to="140" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle r="2"><animate attributeName="cx" from="200" to="200" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" from="230" to="170" dur="2s" repeatCount="indefinite"/></circle>
  </g>
</svg>
